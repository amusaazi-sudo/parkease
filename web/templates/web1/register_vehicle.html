{% extends 'web1/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Register Vehicle{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-8">
    <div class="card"><div class="card-header bg-dark text-white"><h4><i class="fas fa-car me-2"></i>Vehicle Registration</h4></div>
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-bronze">Register Vehicle</button>
            <a href="{% url 'core:active_vehicles' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div></div>
</div></div>
{% endblock %}
