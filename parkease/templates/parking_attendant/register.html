{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen bg-gray-100 py-8">
  <div class="container mx-auto px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md overflow-hidden">
      <div class="bg-blue-600 text-white px-6 py-4">
        <h1 class="text-2xl font-bold">Register New Vehicle</h1>
      </div>
      
      <form method="POST" class="px-6 py-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="mb-4">
            <label for="driver_name" class="block text-sm font-semibold text-gray-700 mb-2">Driver Name</label>
            <input type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" id="driver_name" name="driver_name" required>
          </div>
          
          <div class="mb-4">
            <label for="vehicle_brand" class="block text-sm font-semibold text-gray-700 mb-2">Vehicle Model</label>
            <input type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" id="vehicle_brand" name="vehicle_brand" required>
          </div>
          
          <div class="mb-4">
            <label for="vehicle_type" class="block text-sm font-semibold text-gray-700 mb-2">Vehicle Type</label>
            <select id="vehicle_type" name="vehicle_type" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
              <option value="">Select Vehicle Type</option>
              <option value="Truck">Truck</option>
              <option value="Car">Personal Car</option>
              <option value="Taxi">Taxi</option>
              <option value="Coaster">Coaster</option>
              <option value="Boda">Boda-boda</option>
            </select>
          </div>
          
          <div class="mb-4">
            <label for="number_plate" class="block text-sm font-semibold text-gray-700 mb-2">Number Plate</label>
            <input type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase" id="number_plate" name="number_plate" placeholder="UBA123A" required>
          </div>
          
          <div class="mb-4">
            <label for="color" class="block text-sm font-semibold text-gray-700 mb-2">Color</label>
            <input type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" id="color" name="color" required>
          </div>
          
          <div class="mb-4">
            <label for="phone_number" class="block text-sm font-semibold text-gray-700 mb-2">Phone Number</label>
            <input type="tel" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" id="phone_number" name="phone_number" required>
          </div>
          
          <div class="mb-4 md:col-span-2">
            <label for="nin_number" class="block text-sm font-semibold text-gray-700 mb-2">NIN Number (Optional)</label>
            <input type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" id="nin_number" name="nin_number">
          </div>
        </div>
        
        <div class="flex justify-end space-x-3 mt-6">
          <a href="{% url 'register_table' %}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg transition">Cancel</a>
          <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition">Register Vehicle</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
