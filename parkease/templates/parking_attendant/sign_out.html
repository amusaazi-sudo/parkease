{% extends 'base.html' %}
{% block content %}
<form method="POST">
  {% csrf_token %}
  <div class="min-h-screen bg-gray-100 flex flex-col justify-center sm:py-12">
    <div class="p-10 xs:p-0 mx-auto md:w-full md:max-w-md">
      <h1 class="font-bold text-center text-2xl mb-5">ParkVille - Sign Out</h1>
      
      {% if error %}
      <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm">
        {{ error }}
      </div>
      {% endif %}
      
      <div class="bg-white shadow w-full rounded-lg divide-y divide-gray-200">
        <div class="px-5 py-7">
          <label class="font-semibold text-sm text-gray-600 pb-1 block">Number Plate</label>
          <select
            name="number_plate"
            id="number_plate"
            class="border rounded-lg px-3 py-2 mt-1 mb-5 text-sm w-full"
            required
          >
            <option value="">-- Select Number Plate --</option>
            {% for vehicle in vehicles %}
            <option value="{{ vehicle.number_plate }}" data-driver="{{ vehicle.driver_name }}">
              {{ vehicle.number_plate }}
            </option>
            {% endfor %}
          </select>
          
          <label class="font-semibold text-sm text-gray-600 pb-1 block">Driver Name</label>
          <input
            type="text"
            id="driver_name"
            class="border rounded-lg px-3 py-2 mt-1 mb-5 text-sm w-full bg-gray-100"
            readonly
          />
        </div>
        <div class="p-5">
          <div class="grid grid-cols-2 gap-3">
            <a
              href="{% url 'register_table' %}"
              class="transition duration-200 border border-gray-300 text-gray-700 w-full py-2.5 rounded-lg text-sm text-center hover:shadow-md"
            >
              Back
            </a>
            <button
              type="submit"
              class="transition duration-200 bg-blue-500 hover:bg-blue-600 text-white w-full py-2.5 rounded-lg text-sm shadow-sm"
            >
              Generate Receipt
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>

<script>
  // Auto-populate driver name when number plate is selected
  const numberPlateSelect = document.getElementById('number_plate');
  const driverNameInput = document.getElementById('driver_name');
  
  numberPlateSelect.addEventListener('change', function() {
    const selectedOption = this.options[this.selectedIndex];
    const driverName = selectedOption.getAttribute('data-driver');
    
    if (driverName) {
      driverNameInput.value = driverName;
    } else {
      driverNameInput.value = '';
    }
  });
</script>
{% endblock %}
